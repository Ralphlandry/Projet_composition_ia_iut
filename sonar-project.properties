sonar.projectKey=evalpro-local
sonar.projectName=EvalPro Local
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# Project sources
sonar.sources=exam-backend-fastapi/app,exam-backend-fastapi/scripts,exam-creator-frontend/src,ia/ia_correction
sonar.tests=exam-backend-fastapi/tests

# Language hints
sonar.python.version=3.12
sonar.typescript.tsconfigPaths=exam-creator-frontend/tsconfig.app.json

# Exclusions for local/generated artifacts
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.venv/**,**/venv/**,**/node_modules/**,**/dist/**,**/dist-ssr/**,**/.vite/**
sonar.test.inclusions=**/tests/**,**/test_*.py

# Optional reports (uncomment if generated)
